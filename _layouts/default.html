<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="icon" type="image/png" href="{{ '/assets/images/uong_logo.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
  </head>
  <body>
    <div class="wrapper">
      <header>
        <a href="{{ '/' | relative_url }}"><img src="{{ '/assets/images/uong_logo.png' | relative_url }}" alt="{{ site.title }} logo"></a>
        <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        <p>{{ site.description }}</p>
        <ul>
          <li><a href="{{ '/' | relative_url }}">Home</a></li>
          <li><a href="{{ '/packages.html' | relative_url }}">Packages</a></li>
          <li><a href="{{ '/add-ons.html' | relative_url }}">Add-Ons</a></li>
          <li><a href="{{ '/gallery.html' | relative_url }}">Gallery</a></li>
          <li><a href="{{ '/faqs.html' | relative_url }}">FAQ</a></li>
          <li><a href="{{ '/contact.html' | relative_url }}">Contact</a></li>
        </ul>
      </header>
      <section>
        {{ content }}
      </section>
      <footer>
        <p><small>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</small></p>
      </footer>
    </div>
    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <script>GLightbox();</script>
  </body>
</html>
